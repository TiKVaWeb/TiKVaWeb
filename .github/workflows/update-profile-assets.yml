name: Update profile assets

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render profile SVG assets
        env:
          PROFILE_LOGIN: TiKVaWeb
          GH_PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
        run: python scripts/update_profile_assets.py

      - name: Commit generated assets
        run: |
          if [[ -z "$(git status --porcelain assets/profile-metrics-*.svg assets/activity-overview-*.svg)" ]]; then
            echo "No profile asset changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-metrics-*.svg assets/activity-overview-*.svg
          git commit -m "Update generated profile assets"
          git push
